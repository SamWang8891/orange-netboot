name: orange-netboot
services:
  netboot:
    build:
      context: .
      no_cache: true
    container_name: orange-netboot
    restart: unless-stopped
    privileged: true
    ports:
      - "69:69/udp"    # TFTP
      - "8080:8080"    # Web UI
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/tftp:/srv/tftp        # TFTP root (PXE configs, kernel, DTB per node)
      - /srv/nfs:/srv/nfs:ro         # NFS rootfs on host (read-only for status checks)
      - ./data/uploads:/uploads      # Image uploads
      - ./data/db:/db                # Node database
      - ./webui:/app                 # Python app code
      - ./data:/run/host-data:ro             # Host data dir (agent token lives here)
    environment:
      - TFTP_DIR=/srv/tftp
      - NFS_DIR=/srv/nfs
      - UPLOAD_DIR=/uploads
      - DB_DIR=/db
      - SERVER_IP=${SERVER_IP:-}
      - AGENT_URL=http://host.docker.internal:7777
      - AGENT_TOKEN_FILE=/run/host-data/agent.token
