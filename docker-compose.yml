services:
  netboot:
    build: .
    container_name: netboot-manager
    restart: unless-stopped
    privileged: true
    ports:
      - "69:69/udp"    # TFTP
      - "8080:8080"    # Web UI
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/tftp:/srv/tftp        # TFTP root (PXE configs, kernel, DTB per node)
      - /srv/nfs:/srv/nfs:ro         # NFS rootfs on host (read-only for status checks)
      - ./data/uploads:/uploads      # Image uploads
      - ./data/db:/db                # Node database
      - ./webui:/app                 # Python app code
      - ./data/agent.token:/run/agent.token:ro  # Shared token for host agent auth
    environment:
      - TFTP_DIR=/srv/tftp
      - NFS_DIR=/srv/nfs
      - UPLOAD_DIR=/uploads
      - DB_DIR=/db
      - SERVER_IP=${SERVER_IP:-}
      - AGENT_URL=http://host.docker.internal:7777
      - AGENT_TOKEN_FILE=/run/agent.token
